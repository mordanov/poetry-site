# HTTP — только редиректы и поддержка certbot challenge
server {
    listen 80;
    server_name levgorev.ru www.levgorev.ru;

    # Для certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Редирект с non-www на www
    if ($host = levgorev.ru) {
        return 301 https://www.levgorev.ru$request_uri;
    }

    # Редирект всего остального на https
    return 301 https://$host$request_uri;
}

# HTTPS — основной сервер
server {
    listen 443 ssl;
    server_name www.levgorev.ru levgorev.ru;

    ssl_certificate /etc/letsencrypt/live/www.levgorev.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.levgorev.ru/privkey.pem;

    # Безопасные SSL настройки
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 100M;

    # Редирект с non-www на www (на всякий случай)
    if ($host = levgorev.ru) {
        return 301 https://www.levgorev.ru$request_uri;
    }

    root /var/www/html;
    index index.html;

    # Статика
    location /static/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Прокси для API
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Прокси для загрузок
    location /uploads/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}