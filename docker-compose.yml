services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-in-production}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme123}
      - DB_PATH=/app/data/poetry.db
    volumes:
      - backend_data:/app/data
    expose:
      - "8000"

  nginx:
    build:
      context: .
      dockerfile: ./nginx/Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/templates/index.html:/var/www/html/index.html:ro
      - ./frontend/static:/var/www/html/static:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: >
      sh -c "while :; do
      certbot renew --webroot -w /var/www/certbot &&
      docker kill -s HUP $$(docker ps -q --filter name=nginx);
      sleep 12h;
      done"

volumes:
  backend_data:
  certbot_certs:
  certbot_www:
