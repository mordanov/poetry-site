services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-in-production}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme123}
      DB_PATH: /app/data/poetry.db
      UPLOADS_DIR: /app/data/uploads/poems
      POET_NAME: ${POET_NAME:-Famous poet}
    volumes:
      - backend_data:/app/data
    expose:
      - "8000"

  frontend:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${POETRY_HTTP_PORT:-8080}:80"
    depends_on:
      - backend
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/templates/index.html:/var/www/html/index.html:ro
      - ./frontend/static:/var/www/html/static:ro

volumes:
  backend_data:
