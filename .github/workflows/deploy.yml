name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements*.txt

      - name: Install backend dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run backend tests
        run: pytest test_main.py -v --tb=short

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            frontend/package.json

      - name: Install frontend dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run frontend tests
        run: npm test -- --runInBand

  deploy:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
          VPS_POETRY_DIR: ${{ secrets.VPS_POETRY_DIR }}
          VPS_WEB_FOLDERS_DIR: ${{ secrets.VPS_WEB_FOLDERS_DIR }}
          GH_REPO_READ_TOKEN: ${{ secrets.GH_REPO_READ_TOKEN }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          ssh -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "bash -se -- '$REPO' '$REF_NAME' '$VPS_POETRY_DIR' '$VPS_WEB_FOLDERS_DIR' '$GH_REPO_READ_TOKEN'" << 'EOF'

          set -e

          REPO="$1"
          REF_NAME="$2"
          POETRY_DIR="${3:-$HOME/poetry-site}"
          WEB_FOLDERS_DIR="${4:-$HOME/web-folders}"
          GH_REPO_READ_TOKEN="${5:-}"

          PREVIOUS_COMMIT=""

          if [ -n "$GH_REPO_READ_TOKEN" ]; then
            GIT_AUTH_URL="https://x-access-token:${GH_REPO_READ_TOKEN}@github.com/${REPO}.git"
          else
            GIT_AUTH_URL="https://github.com/${REPO}.git"
          fi

          # --- Update poetry-site repo ---
          mkdir -p "$POETRY_DIR"
          cd "$POETRY_DIR"

          if [ ! -d .git ]; then
            git clone "$GIT_AUTH_URL" .
          fi

          PREVIOUS_COMMIT=$(git rev-parse HEAD || echo "")

          git remote set-url origin "$GIT_AUTH_URL"
          git fetch origin --prune
          git checkout "$REF_NAME"
          git reset --hard "origin/$REF_NAME"

          # --- Rebuild shared stack from web-folders ---
          cd "$WEB_FOLDERS_DIR"

          echo "Building containers..."
          docker compose build poetry-backend nginx
          docker compose up -d --remove-orphans

          echo "Waiting for service..."
          sleep 6

          if curl -fsS http://localhost/api/health > /dev/null; then
            echo "Health check passed"
          else
            echo "Health check failed -> rollback"

            if [ -n "$PREVIOUS_COMMIT" ]; then
              cd "$POETRY_DIR"
              git reset --hard "$PREVIOUS_COMMIT"
              cd "$WEB_FOLDERS_DIR"
              docker compose build poetry-backend nginx
              docker compose up -d
            fi

            exit 1
          fi

          docker compose ps

          # Hide token from git config after successful sync.
          git -C "$POETRY_DIR" remote set-url origin "https://github.com/$REPO.git"

          EOF

      - name: Deploy notification
        if: success()
        run: echo "✅ Deployment to ${{ secrets.VPS_HOST }} completed successfully!"

      - name: Deploy failed notification
        if: failure()
        run: echo "❌ Deployment failed!"
