name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: poetry-site-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-backend:
    runs-on: ubuntu-latest
    name: Backend Tests
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run backend tests
        run: pytest test_main.py -v --tb=short

  test-frontend:
    runs-on: ubuntu-latest
    name: Frontend Tests
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            frontend/package.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run frontend tests
        run: npm test -- --runInBand

  deploy:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    name: Deploy to Production

    steps:
      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          SSH_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
          VPS_POETRY_DIR: ${{ secrets.VPS_POETRY_DIR }}
          VPS_WEB_FOLDERS_DIR: ${{ secrets.VPS_WEB_FOLDERS_DIR }}
          VPS_POETRY_HTTP_PORT: ${{ secrets.VPS_POETRY_HTTP_PORT || 80 }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          ssh -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "bash -se -- '$REPO' '$REF_NAME' '$VPS_POETRY_DIR' '$VPS_WEB_FOLDERS_DIR' '$VPS_POETRY_HTTP_PORT'" << 'EOF'
          set -euo pipefail

          REPO="$1"
          REF_NAME="$2"
          POETRY_DIR="${3:-$HOME/poetry-site}"
          WEB_FOLDERS_DIR="${4:-}"
          POETRY_HTTP_PORT="${5:-80}"

          DEPLOY_MODE="standalone"

          mkdir -p "$POETRY_DIR"
          cd "$POETRY_DIR"

          if [ ! -d .git ]; then
            git clone "https://github.com/$REPO.git" .
          fi

          git fetch origin --prune
          git checkout "$REF_NAME"
          git reset --hard "origin/$REF_NAME"

          if [ -n "$WEB_FOLDERS_DIR" ] && [ -f "$WEB_FOLDERS_DIR/docker-compose.yaml" ]; then
            DEPLOY_MODE="shared"
            cd "$WEB_FOLDERS_DIR"
            docker compose up -d --build poetry-backend nginx certbot
            sleep 6
            docker compose exec -T poetry-backend python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"
          else
            cd "$POETRY_DIR"
            export POETRY_HTTP_PORT
            docker compose up -d --build
            sleep 6
            curl -fsS "http://localhost:${POETRY_HTTP_PORT}/api/health" > /dev/null
          fi

          echo "Deploy mode: $DEPLOY_MODE"
          EOF

      - name: Roll back on failure
        if: failure()
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
          VPS_POETRY_DIR: ${{ secrets.VPS_POETRY_DIR }}
          VPS_WEB_FOLDERS_DIR: ${{ secrets.VPS_WEB_FOLDERS_DIR }}
          VPS_POETRY_HTTP_PORT: ${{ secrets.VPS_POETRY_HTTP_PORT || 80 }}
        run: |
          ssh -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "bash -se -- '$VPS_POETRY_DIR' '$VPS_WEB_FOLDERS_DIR' '$VPS_POETRY_HTTP_PORT'" << 'EOF'
          set -euo pipefail

          POETRY_DIR="${1:-$HOME/poetry-site}"
          WEB_FOLDERS_DIR="${2:-}"
          POETRY_HTTP_PORT="${3:-80}"

          cd "$POETRY_DIR"
          PREVIOUS_COMMIT=$(git reflog --format='%H' -n 2 | tail -n 1 || echo "")

          if [ -z "$PREVIOUS_COMMIT" ]; then
            echo "No rollback commit found"
            exit 0
          fi

          git reset --hard "$PREVIOUS_COMMIT"

          if [ -n "$WEB_FOLDERS_DIR" ] && [ -f "$WEB_FOLDERS_DIR/docker-compose.yaml" ]; then
            cd "$WEB_FOLDERS_DIR"
            docker compose up -d --build poetry-backend nginx certbot
          else
            cd "$POETRY_DIR"
            export POETRY_HTTP_PORT
            docker compose up -d --build
          fi
          EOF

      - name: Deploy notification
        if: success()
        run: echo "✅ Deployment to ${{ secrets.VPS_HOST }} completed successfully!"
