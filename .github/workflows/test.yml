name: Test Pull Request

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    name: Backend Tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run tests with coverage
        run: |
          cd backend
          pytest test_main.py -v --tb=short --cov=. --cov-report=term-missing

      - name: Test results
        if: success()
        run: echo "✅ Backend tests passed!"

      - name: Test failed
        if: failure()
        run: echo "❌ Backend tests failed!"

  test-frontend:
    runs-on: ubuntu-latest
    name: Frontend Tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run tests with coverage
        run: |
          cd frontend
          npm test -- --coverage

      - name: Test results
        if: success()
        run: echo "✅ Frontend tests passed!"

      - name: Test failed
        if: failure()
        run: echo "❌ Frontend tests failed!"

  status-check:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    name: All Tests Status

    steps:
      - name: All tests passed
        run: |
          echo "✅ All tests passed successfully!"
          echo "✅ Backend tests: PASSED"
          echo "✅ Frontend tests: PASSED"
          echo "🚀 Pull request is ready for review"

